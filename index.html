<script>
  /* Set theme before paint - same logic as the deck inside. */
  (function() {
    try {
      var stored = localStorage.getItem('ais-report-theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

  })();

<style>

  --body-font:    'Source Sans 3', system-ui, -apple-system, sans-serif;

  --navy: #0a0d1f;
  --navy-elev: #11162e;
  --navy-edge: #1c244d;
  --paper: #f2efe6;
  --paper-dim: #cdd0e0;
  --paper-mid: #9ea3bf;
  --paper-faint: #6c7290;
  --ais-red: #EF343A;
  --ais-blue: #1257FF;
  --ais-yellow: #FFBA14;
  --ais-yellow-bright: #FDE74C;
  --rule: rgba(255, 255, 255, 0.10);
  --rule-soft: rgba(255, 255, 255, 0.06);
  --page-bg: #04061a;
  --grad-blue:   rgba(18, 87, 255, 0.18);
  --grad-red:    rgba(239, 52, 58, 0.15);
  --grad-yellow: rgba(255, 186, 20, 0.10);
  --field-bg:        rgba(255,255,255,0.05);
  --field-bg-focus:  rgba(255,255,255,0.08);
  --eye-icon-filter:        brightness(0) invert(0.55);
  --eye-icon-filter-hover:  brightness(0) invert(1);
  --shadow-card: rgba(0,0,0,0.7);
}

:root[data-theme="light"] {
  /* Theme B typography on light */
  --display-font: 'Lora', Georgia, 'Times New Roman', serif;
  --body-font:    'Inter', system-ui, -apple-system, sans-serif;

  --navy:        #fafaf7;
  --navy-elev:   #ffffff;
  --navy-edge:   #e3e2dc;
  --paper:       #143642;
  --paper-dim:   #3a4f59;
  --paper-mid:   #6b7e85;
  --paper-faint: #9aa6ac;
  --rule:        rgba(20, 54, 66, 0.14);
  --rule-soft:   rgba(20, 54, 66, 0.07);
  --page-bg:     #efece2;
  --grad-blue:   rgba(18, 87, 255, 0.05);
  --grad-red:    rgba(239, 52, 58, 0.04);
  --grad-yellow: rgba(255, 186, 20, 0.06);
  --field-bg:        rgba(20,54,66,0.04);
  --field-bg-focus:  rgba(20,54,66,0.06);
  --eye-icon-filter:        brightness(0.3);
  --eye-icon-filter-hover:  brightness(0);
  --shadow-card: rgba(20,54,66,0.18);
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--body-font);
  background: var(--page-bg);
  color: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(circle at 12% 20%, var(--grad-blue),   transparent 38%),
    radial-gradient(circle at 88% 80%, var(--grad-red),    transparent 40%),
    radial-gradient(circle at 80% 12%, var(--grad-yellow), transparent 32%),
    var(--navy);
  transition: background 0.35s ease, color 0.35s ease;
}

.gate-shell {
  flex: 1;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: clamp(1.4rem, 4vw, 4rem);
  gap: clamp(1.2rem, 2.4vw, 2rem);
}

/* Top bar */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--body-font);
  font-size: clamp(0.78rem, 1.05vw, 1rem);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--paper-dim);
  padding-bottom: clamp(0.6rem, 1.2vw, 1rem);
  border-bottom: 1px solid var(--rule-soft);
}
.top .left { display: inline-flex; align-items: center; gap: clamp(0.7rem, 1.3vw, 1.1rem); }
.top .ais-logo {
  height: clamp(28px, 4vh, 40px);
  width: auto;
  display: block;
}
.top .school {
  border-left: 1px solid var(--navy-edge);
  padding-left: clamp(0.7rem, 1.3vw, 1.1rem);
  letter-spacing: 0.16em;
}
.top .term {
  color: var(--ais-yellow);
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  letter-spacing: 0.32em;
}
.top .term::before {
  content: "";
  width: 0.45em; height: 0.45em; border-radius: 50%;
  background: var(--ais-yellow);
  box-shadow: 0 0 8px var(--ais-yellow);
}
/* Theme B keeps AIS yellow as the italic / dot accent on light too. */

/* Hero (centered card) */
.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.gate-card {
  width: 100%;
  max-width: 540px;
  background: var(--navy-elev);
  border: 1px solid var(--rule);
  border-radius: clamp(0.8rem, 1.4vw, 1.2rem);
  padding: clamp(2rem, 4vw, 3.4rem);
  box-shadow: 0 30px 60px -20px var(--shadow-card);
  position: relative;
  overflow: hidden;
}
.gate-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--ais-red), var(--ais-yellow), var(--ais-blue));
}
.gate-card::after {
  content: "";
  position: absolute; top: 0; right: 0;
  width: clamp(4rem, 7vw, 6rem);
  height: clamp(4rem, 7vw, 6rem);
  background: radial-gradient(circle, rgba(255, 186, 20, 0.18), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.kicker {
  font-family: var(--body-font);
  font-weight: 700;
  font-size: clamp(0.85rem, 1.1vw, 1.05rem);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--ais-red);
  display: inline-flex;
  align-items: center;
  gap: 0.7em;
  margin-bottom: clamp(0.8rem, 1.4vw, 1.2rem);
}
.kicker .stripe {
  width: clamp(1.6rem, 2.4vw, 2.2rem);
  height: 3px;
  background: linear-gradient(90deg, var(--ais-red), var(--ais-yellow), var(--ais-blue));
  border-radius: 2px;
}

.gate-title {
  font-family: var(--display-font);
  font-weight: 700;
  font-size: clamp(2rem, 4.8vw, 3.4rem);
  line-height: 1.0;
  letter-spacing: -0.018em;
  color: var(--paper);
  margin: 0 0 clamp(0.7rem, 1.3vw, 1.1rem);
}
.gate-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--ais-yellow);
  padding-right: 0.08em;
  display: inline-block;
}
/* italic accent stays AIS yellow in both themes */

.gate-sub {
  font-family: var(--display-font);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.05rem, 1.55vw, 1.3rem);
  line-height: 1.4;
  color: var(--paper-dim);
  margin: 0 0 clamp(1.5rem, 2.4vw, 2rem);
  max-width: 38ch;
}

/* Hide default staticrypt instructions/title */
.staticrypt-instructions, .staticrypt-title, .staticrypt-hr { display: none; }

/* The form */
#staticrypt-form { display: flex; flex-direction: column; gap: clamp(0.7rem, 1.3vw, 1.1rem); }
.staticrypt-password-container {
  position: relative;
  display: flex;
  align-items: center;
}
#staticrypt-password {
  flex: 1;
  width: 100%;
  background: var(--field-bg);
  border: 1.5px solid var(--rule);
  border-radius: clamp(0.5rem, 0.9vw, 0.7rem);
  padding: clamp(0.8rem, 1.4vw, 1.1rem) clamp(2.6rem, 4vw, 3.2rem) clamp(0.8rem, 1.4vw, 1.1rem) clamp(1rem, 1.6vw, 1.3rem);
  font-family: var(--body-font);
  font-size: clamp(1rem, 1.4vw, 1.2rem);
  color: var(--paper);
  letter-spacing: 0.05em;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease;
}
#staticrypt-password::placeholder { color: var(--paper-faint); letter-spacing: 0.18em; text-transform: uppercase; font-size: 0.85em; font-weight: 600; }
#staticrypt-password:focus {
  border-color: var(--ais-yellow);
  background: var(--field-bg-focus);
  box-shadow: 0 0 0 3px rgba(255, 186, 20, 0.18);
}
.staticrypt-toggle-password-visibility {
  position: absolute;
  right: clamp(0.6rem, 1.1vw, 0.95rem);
  top: 50%;
  transform: translateY(-50%);
  width: 1.2em; height: 1.2em;
  cursor: pointer;
  filter: var(--eye-icon-filter);
  opacity: 0.7;
  transition: opacity 0.2s ease, filter 0.2s ease;
}
.staticrypt-toggle-password-visibility:hover { opacity: 1; filter: var(--eye-icon-filter-hover); }

.staticrypt-decrypt-button {
  background: var(--ais-yellow);
  color: var(--navy);
  border: none;
  border-radius: 999px;
  padding: clamp(0.85rem, 1.4vw, 1.15rem) clamp(1.4rem, 2.4vw, 2rem);
  font-family: var(--body-font);
  font-size: clamp(0.95rem, 1.3vw, 1.15rem);
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  box-shadow: 0 12px 24px -10px rgba(255, 186, 20, 0.4);
}
.staticrypt-decrypt-button:hover {
  background: var(--ais-yellow-bright);
  transform: translateY(-2px);
  box-shadow: 0 16px 28px -10px rgba(255, 186, 20, 0.5);
}
:root[data-theme="light"] .staticrypt-decrypt-button { color: #0f1530; }

#staticrypt-remember-label {
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  font-family: var(--body-font);
  font-size: clamp(0.85rem, 1.15vw, 1.05rem);
  color: var(--paper-mid);
  letter-spacing: 0.04em;
  cursor: pointer;
  user-select: none;
}
#staticrypt-remember-label.hidden { display: none; }
#staticrypt-remember {
  width: 1.05em; height: 1.05em;
  accent-color: var(--ais-yellow);
}

/* Error / shake */
.staticrypt-error {
  margin: clamp(0.6rem, 1vw, 0.85rem) 0 0;
  padding: clamp(0.6rem, 1vw, 0.85rem) clamp(0.8rem, 1.3vw, 1.1rem);
  background: rgba(239, 52, 58, 0.14);
  border: 1px solid rgba(239, 52, 58, 0.4);
  border-radius: 6px;
  color: var(--ais-red);
  font-family: var(--body-font);
  font-size: clamp(0.85rem, 1.15vw, 1.05rem);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-align: center;
}
.shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
@keyframes shake {
  10%, 90% { transform: translateX(-1px); }
  20%, 80% { transform: translateX(2px); }
  30%, 50%, 70% { transform: translateX(-4px); }
  40%, 60% { transform: translateX(4px); }
}

/* Loading spinner */
#staticrypt_loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--navy);
  z-index: 1000;
}
#staticrypt_loading.hidden { display: none; }
.staticrypt-spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(255, 186, 20, 0.18);
  border-top-color: var(--ais-yellow);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#staticrypt_content.hidden { display: none; }
.hidden { display: none; }

/* Footer */
.foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--body-font);
  font-size: clamp(0.78rem, 1.05vw, 1rem);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--paper-faint);
  font-weight: 500;
  padding-top: clamp(0.6rem, 1.2vw, 1rem);
  border-top: 1px solid var(--rule-soft);
}

/* Subtle federation stars */
.fed-star {
  position: fixed;
  font-family: var(--display-font);
  pointer-events: none;
  z-index: 1;
}
.fed-star.r { top: 14%; left: 8%; color: var(--ais-red); font-size: clamp(0.9rem, 1.4vw, 1.2rem); animation: tw 4.5s ease-in-out infinite; }
.fed-star.b { top: 22%; right: 12%; color: rgba(77, 141, 255, 0.7); font-size: clamp(0.7rem, 1.1vw, 0.95rem); animation: tw 5s ease-in-out infinite 0.6s; }
.fed-star.y { bottom: 28%; left: 14%; color: var(--ais-yellow); font-size: clamp(0.85rem, 1.3vw, 1.1rem); animation: tw 4.2s ease-in-out infinite 1.2s; }
.fed-star.r2 { bottom: 18%; right: 9%; color: rgba(190, 33, 38, 0.7); font-size: clamp(0.7rem, 1vw, 0.9rem); animation: tw 5.5s ease-in-out infinite 0.3s; }
@keyframes tw { 0%, 100% { opacity: 0.45; transform: scale(1); } 50% { opacity: 1; transform: scale(1.18); } }

/* Theme toggle button - same shape as in the deck. */
.theme-toggle {
  position: fixed;
  left: clamp(0.7rem, 1.4vw, 1.2rem);
  top: 50%;
  transform: translateY(-50%);
  z-index: 1001;
  width: clamp(2rem, 2.4vw, 2.4rem);
  height: clamp(2rem, 2.4vw, 2.4rem);
  border-radius: 50%;
  border: 1px solid var(--rule);
  background: rgba(255,255,255,0.04);
  color: var(--paper-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  -webkit-backdrop-filter: blur(6px);
          backdrop-filter: blur(6px);
}
:root[data-theme="light"] .theme-toggle { background: rgba(15,21,48,0.04); }
.theme-toggle:hover {
  border-color: var(--ais-yellow);
  color: var(--paper);
  transform: translateY(-50%) scale(1.06);
}
.theme-toggle:focus-visible { outline: 2px solid var(--ais-yellow); outline-offset: 3px; }
.theme-toggle .icon { width: 1.05em; height: 1.05em; display: block; }
.theme-toggle .icon-sun  { display: none; }
.theme-toggle .icon-moon { display: block; }
:root[data-theme="light"] .theme-toggle .icon-sun  { display: block; }
:root[data-theme="light"] .theme-toggle .icon-moon { display: none; }

@media (max-width: 600px) {
  .top { font-size: 0.7rem; }
  .top .school { display: none; }
  .foot { flex-direction: column; gap: 0.4rem; text-align: center; }
  .theme-toggle {
    top: 0.6rem; left: 0.6rem; transform: none;
    width: 2.1rem; height: 2.1rem;
  }
  .theme-toggle:hover { transform: scale(1.06); }
}
</style>
</head>

  /* Theme toggle wiring (same pattern as the deck inside) */
  (function initTheme() {
    const root = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const themedImages = Array.from(document.querySelectorAll('img[data-light-src]'));
    themedImages.forEach(img => { img.dataset.darkSrc = img.getAttribute('src'); });

        if (img.getAttribute('src') !== next) img.setAttribute('src', next);
      });
    }
    function applyTheme(theme, persist) {
      if (theme === 'light') root.setAttribute('data-theme', 'light');
      else root.removeAttribute('data-theme');
      syncImages(theme);
      if (persist) {
        try { localStorage.setItem('ais-report-theme', theme); } catch (e) {}
      }
    }
    syncImages(root.getAttribute('data-theme') === 'light' ? 'light' : 'dark');
    if (toggle) {
      toggle.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        applyTheme(next, true);
      });
    }
    const mq = window.matchMedia('(prefers-color-scheme: light)');
    mq.addEventListener('change', e => {
      let stored = null;
      try { stored = localStorage.getItem('ais-report-theme'); } catch (err) {}
      if (!stored) applyTheme(e.matches ? 'light' : 'dark', false);
    });
